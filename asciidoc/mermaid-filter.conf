#
# AsciiDoc mermaid block definition.
# Wraps block content in <pre class="mermaid"> for client-side rendering.
# Requires mermaid.min.js loaded in the page template.
# Usage:
#   [mermaid]
#   ----
#   flowchart LR
#     A[Browser] --> B[Spring Boot RP]
#   ----
#

[mermaid-block]
<div class="mermaid-diagram">
<pre class="mermaid">
|
</pre>
</div>

[blockdef-listing]
mermaid-style=template="mermaid-block",subs=()
